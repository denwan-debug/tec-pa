<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Buat Kata Sandi Baru - TEC Pembimbing</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
* { margin:0; padding:0; box-sizing:border-box; font-family:'Poppins', sans-serif; }

body {
    height: 100vh;
    display: flex;
    background: #fdfbfb;
    overflow: hidden;
}

.left-panel {
    width: 55%;
    background: #f4f6f8;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
    padding: 20px;
}

.left-panel img {
    width: 100%;
    max-width: 900px;
    max-height: 90vh;
    object-fit: contain;
}

.right-panel {
    width: 45%;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 40px;
}

.login-card {
    width: 100%;
    max-width: 480px;
    background: #ffffff;
    border-radius: 20px;
    padding: 45px 50px;
    box-shadow: 0 10px 40px rgba(0, 0, 0, 0.04);
}

.title {
    font-size: 26px;
    font-weight: 700;
    color: #212121;
    margin-bottom: 8px;
    letter-spacing: 0.5px;
}

.subtitle {
    color: #757575;
    font-size: 14px;
    line-height: 1.6;
    margin-bottom: 35px;
}

.form-group { margin-bottom: 20px; }

.form-group label {
    display: block;
    margin-bottom: 8px;
    font-size: 12px;
    color: #424242;
    font-weight: 500;
}

.input-wrapper { position: relative; }

.input-wrapper input {
    width: 100%;
    height: 52px;
    background: #fcf4f6;
    border: 1px solid #f4d9df;
    border-radius: 12px;
    padding: 0 20px;
    font-size: 14px;
    color: #424242;
    outline: none;
    transition: 0.3s;
}

.input-wrapper input::placeholder { color: #b0a5a8; }

.input-wrapper input:focus {
    border-color: #ed5a8b;
    background: #ffffff;
}

.input-wrapper .fa-eye,
.input-wrapper .fa-eye-slash {
    position: absolute;
    right: 18px;
    top: 50%;
    transform: translateY(-50%);
    color: #424242;
    font-size: 16px;
    cursor: pointer;
}

.hint { font-size: 11px; color: #a0a0a0; margin-top: 6px; }

.btn-login {
    width: 100%;
    height: 52px;
    margin-top: 15px;
    border: none;
    border-radius: 12px;
    background: #ed5a8b;
    color: white;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: 0.3s;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 8px;
}

.btn-login:hover { background: #d44876; }
.btn-login:disabled { opacity: 0.7; cursor: not-allowed; }

.alert { display: none; padding: 12px; margin-top: 20px; border-radius: 10px; font-size: 13px; text-align: center; font-weight: 500; }
.alert-error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
.alert-success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }

@media(max-width:1100px){
    .left-panel { display: none; }
    .right-panel { width: 100%; background: #f4f6f8; }
}
</style>
</head>
<body>

<div class="left-panel">
    <img src="{{ url_for('static', filename='images/ilustrasi-pembimbing.png') }}" alt="Ilustrasi Kelas">
</div>

<div class="right-panel">
    <div class="login-card">

        <h1 class="title">Buat Kata Sandi Baru</h1>

        <p class="subtitle">
            Kata sandi baru Anda harus berbeda dari kata sandi yang digunakan sebelumnya.
        </p>

        <div id="alertBox" class="alert"></div>

        <form id="resetForm">
            <div class="form-group">
                <label>Kata Sandi Baru</label>
                <div class="input-wrapper">
                    <input type="password" id="password" placeholder="••••••••" required>
                    <i class="fa-regular fa-eye" id="togglePassword1" onclick="toggleVisibility('password', 'togglePassword1')"></i>
                </div>
                <p class="hint">Minimal 8 karakter</p>
            </div>

            <div class="form-group">
                <label>Konfirmasi Kata Sandi Baru</label>
                <div class="input-wrapper">
                    <input type="password" id="konfirmasi" placeholder="••••••••" required>
                    <i class="fa-regular fa-eye" id="togglePassword2" onclick="toggleVisibility('konfirmasi', 'togglePassword2')"></i>
                </div>
            </div>

            <button type="submit" class="btn-login" id="submitBtn">
                Simpan Kata Sandi Baru <i class="fa-solid fa-check"></i>
            </button>
        </form>
    </div>
</div>

<script>
    function toggleVisibility(inputId, iconId) {
        const input = document.getElementById(inputId);
        const icon = document.getElementById(iconId);
        if (input.type === 'password') {
            input.type = 'text';
            icon.classList.remove('fa-eye');
            icon.classList.add('fa-eye-slash');
        } else {
            input.type = 'password';
            icon.classList.remove('fa-eye-slash');
            icon.classList.add('fa-eye');
        }
    }

    document.getElementById('resetForm').addEventListener('submit', async function(e) {
        e.preventDefault();

        const password = document.getElementById('password').value;
        const konfirmasi = document.getElementById('konfirmasi').value;
        const btn = document.getElementById('submitBtn');
        const alertBox = document.getElementById('alertBox');

        alertBox.style.display = 'none';
        alertBox.className = 'alert';

        if (password.length < 8) {
            alertBox.classList.add('alert-error');
            alertBox.innerText = 'Kata sandi minimal 8 karakter!';
            alertBox.style.display = 'block';
            return;
        }

        if (password !== konfirmasi) {
            alertBox.classList.add('alert-error');
            alertBox.innerText = 'Konfirmasi kata sandi tidak cocok!';
            alertBox.style.display = 'block';
            return;
        }

        btn.disabled = true;
        btn.innerHTML = 'Menyimpan... <i class="fa-solid fa-spinner fa-spin"></i>';

        try {
            const response = await fetch('/reset-password-pengajar', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ password: password, konfirmasi_password: konfirmasi })
            });

            const data = await response.json();

            if (response.ok) {
                alertBox.classList.add('alert-success');
                alertBox.innerText = data.message || 'Kata sandi berhasil diubah! Mengalihkan ke login...';
                alertBox.style.display = 'block';

                setTimeout(() => {
                    window.location.href = data.redirect;
                }, 1200);
            } else {
                alertBox.classList.add('alert-error');
                alertBox.innerText = data.message || 'Gagal menyimpan kata sandi baru.';
                alertBox.style.display = 'block';
                btn.disabled = false;
                btn.innerHTML = 'Simpan Kata Sandi Baru <i class="fa-solid fa-check"></i>';
            }
        } catch (error) {
            alertBox.classList.add('alert-error');
            alertBox.innerText = 'Gagal terhubung ke server.';
            alertBox.style.display = 'block';
            btn.disabled = false;
            btn.innerHTML = 'Simpan Kata Sandi Baru <i class="fa-solid fa-check"></i>';
        }
    });
</script>

</body>
</html>
