<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TEC Parent Portal - Buat Password Baru</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { display: flex; height: 100vh; color: #333; overflow: hidden; }
        .split-screen { display: flex; width: 100%; height: 100%; }
        .left-pane { flex: 1; background: radial-gradient(circle at top left, #fff0f5, #fdf8fa, #f4f5fa); display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px; text-align: center; }
        .left-pane h1 { font-size: 1.8rem; color: #2d3748; margin-bottom: 20px; line-height: 1.4; }
        .left-pane p { font-size: 0.95rem; color: #718096; margin-bottom: 40px; line-height: 1.6; max-width: 80%; }
        .illustration-container { width: 100%; max-width: 100px; background-color: transparent; border-radius: 16px; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        .illustration-container img { width: 100%; height: auto; object-fit: contain; border-radius: 12px; }
        .right-pane { flex: 1; background-color: #fafbfc; display: flex; flex-direction: column; padding: 40px; align-items: center; justify-content: center; }
        .header-brand { display: flex; align-items: center; gap: 12px; margin-bottom: 30px; width: 100%; max-width: 450px; }
        .brand-logo { background-color: #902b54; color: white; width: 36px; height: 36px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 1.2rem; }
        .brand-text { color: #902b54; font-size: 1.2rem; font-weight: 600; }
        .login-card { background-color: #ffffff; width: 100%; max-width: 450px; padding: 40px; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.03); }
        .login-card h2 { font-size: 1.5rem; color: #1a202c; margin-bottom: 10px; }
        .login-card p { font-size: 0.9rem; color: #718096; margin-bottom: 30px; line-height: 1.5; }
        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; font-size: 0.85rem; font-weight: 600; color: #4a5568; margin-bottom: 8px; }
        .input-wrapper input { width: 100%; padding: 12px 15px; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 0.95rem; outline: none; transition: border-color 0.2s; }
        .input-wrapper input:focus { border-color: #e85d89; }
        .btn-primary { width: 100%; background-color: #ed648f; color: white; border: none; padding: 14px; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: background-color 0.3s; display: flex; justify-content: center; align-items: center; gap: 10px; margin-top: 10px; }
        .btn-primary:hover { background-color: #d84b77; }
        @media (max-width: 768px) { .split-screen { flex-direction: column; height: auto; overflow-y: auto; } .left-pane, .right-pane { padding: 20px; } }
    </style>
</head>
<body>
    <div class="split-screen">
        <div class="left-pane">
            <h1>Partner Terbaik untuk Pendidikan<br>Anak Anda</h1>
            <p>Menghubungkan orang tua dengan perkembangan akademik<br>harian di T English Club.</p>
            <div class="illustration-container">
                <img src="{{ url_for('static', filename='images/parent-illustration.png') }}" alt="Mitra Akademik Terpercaya">
            </div>
        </div>
        <div class="right-pane">
            <div class="header-brand">
                <div class="brand-logo">T</div>
                <div class="brand-text">TEC Parent Portal</div>
            </div>
            <div class="login-card">
                <h2>Buat Password Baru</h2>
                <p>Silakan masukkan kata sandi baru Anda.</p>
                <form id="resetPasswordForm">
                    <div id="alertMessage" style="display: none; padding: 10px; border-radius: 8px; margin-bottom: 15px; font-size: 0.85rem; font-weight: 600; text-align: center;"></div>
                    <div class="input-group">
                        <label for="newPassword">Kata Sandi Baru</label>
                        <div class="input-wrapper">
                            <input type="password" id="newPassword" required placeholder="Minimal 8 karakter">
                        </div>
                    </div>
                    <div class="input-group">
                        <label for="confirmPassword">Konfirmasi Kata Sandi Baru</label>
                        <div class="input-wrapper">
                            <input type="password" id="confirmPassword" required placeholder="Ketik ulang kata sandi baru">
                        </div>
                    </div>
                    <button type="submit" id="submitBtn" class="btn-primary">
                        Simpan Password Baru ➔
                    </button>
                </form>
            </div>
        </div>
    </div>
    <script>
        document.getElementById('resetPasswordForm').addEventListener('submit', async function(event) {
            event.preventDefault(); 
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const alertBox = document.getElementById('alertMessage');
            const btn = document.getElementById('submitBtn');

            if (newPassword !== confirmPassword) {
                alertBox.style.display = 'block';
                alertBox.style.backgroundColor = '#f8d7da';
                alertBox.style.color = '#721c24';
                alertBox.innerText = "Kata sandi tidak cocok. Silakan coba lagi.";
                return;
            }

            btn.innerHTML = "Menyimpan...";
            btn.disabled = true;

            try {
                const response = await fetch('{{ url_for("orangtua.reset_password") }}', { 
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password: newPassword })
                });

                const data = await response.json();
                alertBox.style.display = 'block';
                
                if (response.ok) {
                    alertBox.style.backgroundColor = '#d4edda';
                    alertBox.style.color = '#155724';
                    alertBox.innerText = data.message;
                    setTimeout(() => { window.location.href = data.redirect; }, 2000);
                } else {
                    alertBox.style.backgroundColor = '#f8d7da';
                    alertBox.style.color = '#721c24';
                    alertBox.innerText = data.message;
                    btn.innerHTML = "Simpan Password Baru ➔";
                    btn.disabled = false;
                }
            } catch (error) {
                alertBox.style.display = 'block';
                alertBox.style.backgroundColor = '#f8d7da';
                alertBox.style.color = '#721c24';
                alertBox.innerText = "Terjadi kesalahan pada server.";
                btn.innerHTML = "Simpan Password Baru ➔";
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
