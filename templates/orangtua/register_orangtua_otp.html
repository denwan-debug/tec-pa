<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TEC Parent Portal - Verifikasi OTP</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            display: flex;
            height: 100vh;
            overflow: hidden;
            color: #333;
        }

        .split-screen {
            display: flex;
            width: 100%;
            height: 100%;
        }

        /* LEFT */
        .left-pane {
            flex: 1;
            background-color: #43535c;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px;
            text-align: center;
            color: #ffffff;
        }

        .left-pane h3 {
            font-size: 1.1rem;
            font-weight: 400;
            margin-top: 30px;
        }

        .left-pane p {
            font-size: 0.85rem;
            color: #cbd5e1;
            line-height: 1.6;
            max-width: 75%;
        }

        .illustration-container {
            width: 100%;
            max-width: 440px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .illustration-container img {
            width: 100%;
            border-radius: 12px;
        }

        /* RIGHT */
        .right-pane {
            flex: 1.1;
            background-color: #fffbfa;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px;
        }

        .header-brand {
            text-align: center;
            margin-bottom: 25px;
        }

        .brand-logo-title {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            color: #902b54;
            font-weight: 700;
        }

        .brand-logo {
            background-color: #ed648f;
            color: white;
            width: 24px;
            height: 24px;
            border-radius: 6px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .header-brand h2 {
            margin-top: 10px;
            color: #1a202c;
        }

        .header-brand p {
            font-size: 0.85rem;
            color: #718096;
        }

        /* OTP BOX */
        .otp-container {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin: 20px 0;
        }

        .otp-input {
            width: 45px;
            height: 50px;
            text-align: center;
            font-size: 1.2rem;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            outline: none;
            transition: 0.2s;
        }

        .otp-input:focus {
            border-color: #902b54;
        }

        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
        }

        .btn-primary {
            background-color: #902b54;
            color: white;
        }

        .btn-primary:hover {
            background-color: #701f40;
        }

        .btn-secondary {
            background-color: #fff5f7;
            border: 1px solid #f7d2db;
            color: #4a5568;
        }

        .btn-secondary:hover {
            background-color: #fbe7eb;
        }

        .info-text {
            font-size: 0.85rem;
            color: #718096;
            text-align: center;
        }

        .alert {
            display: none;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 10px;
            font-size: 0.85rem;
            text-align: center;
        }

        @media (max-width: 820px) {
            body {
                flex-direction: column;
                overflow-y: auto;
                height: auto;
            }

            .split-screen {
                flex-direction: column;
            }

            .otp-container {
                flex-wrap: wrap;
            }
        }
    </style>
</head>

<body>

<div class="split-screen">

    <!-- LEFT -->
    <div class="left-pane">
        <div class="illustration-container">
            <img src="{{ url_for('static', filename='images/otp-illustration.png') }}" alt="OTP Verification">
        </div>
        <h3>Verifikasi Keamanan Akun</h3>
        <p>Kami mengirimkan kode OTP ke email/nomor Anda untuk memastikan keamanan akun.</p>
    </div>

    <!-- RIGHT -->
    <div class="right-pane">

        <div class="header-brand">
            <div class="brand-logo-title">
                <div class="brand-logo">🔐</div>
                <span>TEC Parent Portal</span>
            </div>
            <h2>Masukkan Kode OTP</h2>
            <p>Kode OTP terkirim ke: <span id="emailDisplay" style="font-weight: 600; color: #902b54;"></span></p>
        </div>

        <div id="alertBox" class="alert"></div>

        <div class="otp-container">
            <input class="otp-input" maxlength="1">
            <input class="otp-input" maxlength="1">
            <input class="otp-input" maxlength="1">
            <input class="otp-input" maxlength="1">
            <input class="otp-input" maxlength="1">
            <input class="otp-input" maxlength="1">
        </div>

        <button type="button" class="btn btn-primary" id="verifyBtn" onclick="verifyOTP()">Verifikasi</button>
        <button class="btn btn-secondary" id="resendBtn" onclick="resend_OTP()" disabled style="opacity: 0.5; cursor: not-allowed;">
            Kirim Ulang OTP (02:00)
        </button>

        <p class="info-text">OTP kedaluwarsa dalam: <span id="timerDisplay" style="font-weight: 600; color: #902b54;">05:00</span></p>
    </div>

</div>

    <script>
        const inputs = document.querySelectorAll('.otp-input');

        // Auto move input
        inputs.forEach((input, index) => {
            input.addEventListener('input', () => {
                if (input.value && index < inputs.length - 1) {
                    inputs[index + 1].focus();
                }
            });
        });

        function getOTP() {
            return Array.from(inputs).map(i => i.value).join('');
        }

        function getOTP() {
        return Array.from(inputs).map(i => i.value).join('');
        }

    // --- TAMBAHKAN FUNGSI INI ---
        function clearOTPInputs() {
            const inputs = document.querySelectorAll('.otp-input');
            inputs.forEach(input => input.value = ''); // Kosongkan semua kotak
            inputs[0].focus();
        }

        // --- 1. FUNGSI TIMER REAL-TIME OTP (5 MENIT) ---
        let otpInterval;
        function startOTPTimer() {
            const display = document.getElementById('timerDisplay');
            const verifyBtn = document.getElementById('verifyBtn')  ;
            
            // AMBIL WAKTU EXPIRED DARI DATABASE YANG DISIMPAN DI SESSION
            const endTime = parseInt(sessionStorage.getItem("otp_expired_ms"));

            if (!endTime || isNaN(endTime)) {
                display.textContent = "Error Waktu";
                return;
            }

            verifyBtn.disabled = false;
            verifyBtn.innerText = "Verifikasi";
            verifyBtn.style.opacity = "1";
            verifyBtn.style.cursor = "pointer";
            display.style.color = "#902b54";

            clearInterval(otpInterval);

            otpInterval = setInterval(function () {
                const now = Date.now();
                // Kurangi waktu expired dari DB dengan waktu device user sekarang
                const remainingTime = Math.max(0, endTime - now); 
                const secondsLeft = Math.ceil(remainingTime / 1000);

                let minutes = Math.floor(secondsLeft / 60);
                let seconds = secondsLeft % 60;

                minutes = minutes < 10 ? "0" + minutes : minutes;
                seconds = seconds < 10 ? "0" + seconds : seconds;

                display.textContent = minutes + ":" + seconds;

                if (secondsLeft <= 0) {
                    clearInterval(otpInterval);
                    display.textContent = "00:00 (Waktu Habis!)";
                    display.style.color = "red";
                    
                    verifyBtn.disabled = true;
                    verifyBtn.innerText = "OTP Kedaluwarsa";
                    verifyBtn.style.opacity = "0.5";
                    verifyBtn.style.cursor = "not-allowed";
                }
            }, 1000);
        }
        

        // --- 2. FUNGSI TIMER REAL-TIME KIRIM ULANG (2 MENIT) ---
        let resendInterval;
        function startResendCooldown() {
            const resendBtn = document.getElementById('resendBtn');
            
            // Atur Waktu Target = Waktu Saat Ini + 2 Menit (120.000 ms)
            const endTime = Date.now() + (120 * 1000);
            
            resendBtn.disabled = true;
            resendBtn.style.opacity = "0.5";
            resendBtn.style.cursor = "not-allowed";

            clearInterval(resendInterval);

            resendInterval = setInterval(function () {
                const now = Date.now();
                const remainingTime = Math.max(0, endTime - now);
                const secondsLeft = Math.ceil(remainingTime / 1000);

                let minutes = Math.floor(secondsLeft / 60);
                let seconds = secondsLeft % 60;

                minutes = minutes < 10 ? "0" + minutes : minutes;
                seconds = seconds < 10 ? "0" + seconds : seconds;

                resendBtn.innerText = `Kirim Ulang OTP (${minutes}:${seconds})`;

                if (secondsLeft <= 0) {
                    clearInterval(resendInterval);
                    
                    resendBtn.disabled = false;
                    resendBtn.innerText = "Kirim Ulang OTP";
                    resendBtn.style.opacity = "1";
                    resendBtn.style.cursor = "pointer";
                }
            }, 1000);
        }

        async function resend_OTP() {
    const alertBox = document.getElementById('alertBox');
    const resendBtn = document.getElementById('resendBtn');
    
    // Mengambil data dari sessionStorage yang disimpan saat pendaftaran
    const email = sessionStorage.getItem("otp_email");
    const userId = sessionStorage.getItem("user_id");

    // Validasi data sesi
    if (!email || !userId) {
        alert("Sesi Anda telah habis. Silakan kembali ke halaman pendaftaran.");
        window.location.href = "/register";
        return;
    }

    // Ubah status tombol menjadi loading
    resendBtn.disabled = true;
    resendBtn.innerText = "Mengirim...";
    alertBox.style.display = 'none';

    try {
        const res = await fetch('/resend_otp', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email: email, user_id: userId })
        });

        const data = await res.json();
        alertBox.style.display = 'block';

        if (res.ok) {
            // Jika sukses
            alertBox.style.background = '#d4edda';
            alertBox.style.color = '#155724';
            alertBox.innerText = data.message;

            // Perbarui waktu expired baru dari database ke session storage
            sessionStorage.setItem("otp_expired_ms", data.expired_ms);
            
            // Mulai ulang kedua timer
            startOTPTimer();
            startResendCooldown();
            
            // Bersihkan input OTP agar user bisa mengetik ulang
            const inputs = document.querySelectorAll('.otp-input');
            inputs.forEach(input => input.value = '');
            inputs[0].focus();
        } else {
            // Jika gagal dari sisi server
            alertBox.style.background = '#f8d7da';
            alertBox.style.color = '#721c24';
            alertBox.innerText = data.message;
            
            // Aktifkan kembali tombol agar bisa dicoba lagi
            resendBtn.disabled = false;
            resendBtn.innerText = "Kirim Ulang OTP";
        }
    } catch (error) {
        console.error("Error saat resend OTP:", error);
        alertBox.style.display = 'block';
        alertBox.style.background = '#f8d7da';
        alertBox.style.color = '#721c24';
        alertBox.innerText = "Gagal terhubung ke server. Periksa koneksi Anda.";
        
        // Aktifkan kembali tombol
        resendBtn.disabled = false;
        resendBtn.innerText = "Kirim Ulang OTP";
    }
}

        // --- JALANKAN KEDUA TIMER SAAT HALAMAN DIMUAT ---
        window.onload = function() {
    // 1. Ambil email dari session storage
    const email = sessionStorage.getItem("otp_email");
    
    // 2. Masukkan ke elemen HTML
    if (email) {
        document.getElementById('emailDisplay').innerText = email;
    } else {
        // Jika tidak ada email, sembunyikan teksnya atau beri pesan cadangan
        document.getElementById('emailDisplay').innerText = "email Anda";
    }

    // 3. Jalankan fungsi timer yang sudah ada
    startOTPTimer();
    startResendCooldown();
};

        // --- 3. FUNGSI VERIFIKASI ---
        async function verifyOTP() {
        console.log("Tombol Verifikasi Ditekan!"); // Tanda di Console F12

        const otp = getOTP();
        const userId = sessionStorage.getItem("user_id");
        const alertBox = document.getElementById('alertBox');
        const verifyBtn = document.getElementById('verifyBtn');

        if (!userId) {
            alert("Sesi Anda telah habis atau data tidak ditemukan. Silakan daftar ulang.");
            window.location.href = "/register";
            return;
        }

        if (otp.length < 6) {
            alertBox.style.display = 'block';
            alertBox.style.background = '#f8d7da';
            alertBox.style.color = '#721c24';
            alertBox.innerText = 'OTP belum lengkap.';
            return;
        }

        // --- EFEK LOADING ---
        verifyBtn.disabled = true;
        verifyBtn.innerText = "Memverifikasi...";
        alertBox.style.display = 'none';

        try {
            const res = await fetch('/verify_otp', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ otp: otp, user_id: userId })
            });

            const data = await res.json();
            alertBox.style.display = 'block';

            if (res.ok) {
                // Jika Berhasil
                alertBox.style.background = '#d4edda';
                alertBox.style.color = '#155724';
                alertBox.innerText = data.message;
                
                // Matikan semua timer agar tidak berjalan di background
                clearInterval(otpInterval);
                clearInterval(resendInterval);

                // Pindah halaman setelah 1,2 detik
                setTimeout(() => {
                    window.location.href = data.redirect;
                }, 1200);

            } else {
                alertBox.style.background = '#f8d7da';
                alertBox.style.color = '#721c24';
                alertBox.innerText = data.message;
                
                verifyBtn.disabled = false;
                verifyBtn.innerText = "Verifikasi";
                
                clearOTPInputs();
            }
        } catch (error) {
            // Jika server mati atau koneksi putus
            console.error("Fetch Error Verify:", error);
            alertBox.style.display = 'block';
            alertBox.style.background = '#f8d7da';
            alertBox.style.color = '#721c24';
            alertBox.innerText = "Gagal terhubung ke server.";
            
            verifyBtn.disabled = false;
            verifyBtn.innerText = "Verifikasi";
        }
    }
    </script>
</body>
</html>
