<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TEC Parent Portal - Verifikasi OTP</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { display: flex; height: 100vh; color: #333; overflow: hidden; }
        .split-screen { display: flex; width: 100%; height: 100%; }
        .left-pane { flex: 1; background: radial-gradient(circle at top left, #fff0f5, #fdf8fa, #f4f5fa); display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px; text-align: center; }
        .left-pane h1 { font-size: 1.8rem; color: #2d3748; margin-bottom: 20px; line-height: 1.4; }
        .left-pane p { font-size: 0.95rem; color: #718096; margin-bottom: 40px; line-height: 1.6; max-width: 80%; }
        .illustration-container { width: 100%; max-width: 100px; background-color: transparent; border-radius: 16px; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        .illustration-container img { width: 100%; height: auto; object-fit: contain; border-radius: 12px; }
        .right-pane { flex: 1; background-color: #fafbfc; display: flex; flex-direction: column; padding: 40px; align-items: center; justify-content: center; }
        .header-brand { display: flex; align-items: center; gap: 12px; margin-bottom: 30px; width: 100%; max-width: 450px; }
        .brand-logo { background-color: #902b54; color: white; width: 36px; height: 36px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 1.2rem; }
        .brand-text { color: #902b54; font-size: 1.2rem; font-weight: 600; }
        .login-card { background-color: #ffffff; width: 100%; max-width: 450px; padding: 40px; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.03); }
        .login-card h2 { font-size: 1.5rem; color: #1a202c; margin-bottom: 10px; }
        .login-card p { font-size: 0.9rem; color: #718096; margin-bottom: 30px; line-height: 1.5; }
        .input-group { margin-bottom: 30px; }
        .input-group label { display: block; font-size: 0.85rem; font-weight: 600; color: #4a5568; margin-bottom: 8px; text-align: center; }
        
        /* Bagian Input OTP (Sama seperti register_orangtua_otp.html) */
        .otp-container {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin: 20px 0;
        }

        .otp-input {
            width: 45px;
            height: 50px;
            text-align: center;
            font-size: 1.2rem;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            outline: none;
            transition: 0.2s;
        }

        .otp-input:focus {
            border-color: #902b54;
        }

        .btn-primary { width: 100%; background-color: #ed648f; color: white; border: none; padding: 14px; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: background-color 0.3s; display: flex; justify-content: center; align-items: center; gap: 10px; }
        .btn-primary:hover { background-color: #d84b77; }
        
        /* Style Teks Info Timer */
        .info-text {
            font-size: 0.85rem;
            color: #718096;
            text-align: center;
            margin-top: 20px;
        }

        @media (max-width: 768px) { .split-screen { flex-direction: column; height: auto; overflow-y: auto; } .left-pane, .right-pane { padding: 20px; } .otp-container { flex-wrap: wrap; } }
    </style>
</head>
<body>
    <div class="split-screen">
        <div class="left-pane">
            <h1>Partner Terbaik untuk Pendidikan<br>Anak Anda</h1>
            <p>Menghubungkan orang tua dengan perkembangan akademik<br>harian di T English Club.</p>
            <div class="illustration-container">
                <img src="{{ url_for('static', filename='images/LOGO_TEC_NOBG.png') }}" alt="Mitra Akademik Terpercaya">
            </div>
        </div>
        <div class="right-pane">
            <div class="header-brand">
                <div class="brand-logo">T</div>
                <div class="brand-text">TEC Parent Portal</div>
            </div>
            <div class="login-card">
                <h2>Verifikasi OTP</h2>
                <p>Masukkan 6 digit kode OTP yang telah dikirimkan ke email <b>{{ email }}</b>.</p>
                
                <form id="otpForm">
                    <div id="alertMessage" style="display: none; padding: 10px; border-radius: 8px; margin-bottom: 15px; font-size: 0.85rem; font-weight: 600; text-align: center;"></div>
                    <input type="hidden" id="emailInput" value="{{ email }}">
                    
                    <div class="input-group">
                        <label>Kode OTP</label>
                        <div class="otp-container">
                            <input class="otp-input" maxlength="1" type="text" inputmode="numeric" pattern="[0-9]*">
                            <input class="otp-input" maxlength="1" type="text" inputmode="numeric" pattern="[0-9]*">
                            <input class="otp-input" maxlength="1" type="text" inputmode="numeric" pattern="[0-9]*">
                            <input class="otp-input" maxlength="1" type="text" inputmode="numeric" pattern="[0-9]*">
                            <input class="otp-input" maxlength="1" type="text" inputmode="numeric" pattern="[0-9]*">
                            <input class="otp-input" maxlength="1" type="text" inputmode="numeric" pattern="[0-9]*">
                        </div>
                    </div>

                    <button type="submit" id="verifyBtn" class="btn-primary">
                        Verifikasi Kode
                    </button>

                    <p class="info-text">OTP kedaluwarsa dalam: <span id="timerDisplay" style="font-weight: 600; color: #902b54;">05:00</span></p>
                </form>
            </div>
        </div>
    </div>

    <script>
        const inputs = document.querySelectorAll('.otp-input');

        // 1. Logika Otomatis Pindah Kotak (Auto-focus) + Deteksi Backspace
        inputs.forEach((input, index) => {
            input.addEventListener('input', () => {
                if (input.value && index < inputs.length - 1) {
                    inputs[index + 1].focus();
                }
            });

            input.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && !input.value && index > 0) {
                    inputs[index - 1].focus();
                }
            });
        });

        function getOTP() {
            return Array.from(inputs).map(i => i.value).join('');
        }

        function clearOTPInputs() {
            inputs.forEach(input => input.value = '');
            inputs[0].focus();
        }

        // --- 2. LOGIKA TIMER ANTI-RESET SAAT REFRESH ---
        let otpInterval;
        function startOTPTimer() {
            const display = document.getElementById('timerDisplay');
            const verifyBtn = document.getElementById('verifyBtn');
            
            // Periksa apakah target waktu akhir sudah tersimpan di browser
            let endTime = sessionStorage.getItem("lupa_password_otp_timeout");

            if (!endTime) {
                // Jika belum ada (berarti pertama kali buka halaman), buat target baru: Waktu Sekarang + 5 Menit
                endTime = Date.now() + (5 * 60 * 1000);
                sessionStorage.setItem("lupa_password_otp_timeout", endTime);
            } else {
                // Jika sudah ada, ubah teks string menjadi format angka integer kembali
                endTime = parseInt(endTime);
            }

            clearInterval(otpInterval);

            otpInterval = setInterval(function () {
                const now = Date.now();
                const remainingTime = endTime - now; // Hitung selisih waktu saat ini dengan target mati

                if (remainingTime <= 0) {
                    clearInterval(otpInterval);
                    display.textContent = "00:00 (Waktu Habis!)";
                    display.style.color = "red";
                    
                    // Kunci tombol verifikasi karena kode sudah mati
                    verifyBtn.disabled = true;
                    verifyBtn.innerText = "OTP Kedaluwarsa";
                    verifyBtn.style.opacity = "0.5";
                    verifyBtn.style.cursor = "not-allowed";
                    
                    // Bersihkan dari session storage agar jika minta OTP baru tidak tabrakan
                    sessionStorage.removeItem("lupa_password_otp_timeout");
                    return;
                }

                const secondsLeft = Math.ceil(remainingTime / 1000);
                let minutes = Math.floor(secondsLeft / 60);
                let seconds = secondsLeft % 60;

                minutes = minutes < 10 ? "0" + minutes : minutes;
                seconds = seconds < 10 ? "0" + seconds : seconds;

                display.textContent = minutes + ":" + seconds;
            }, 1000);
        }

        // Jalankan fungsi timer otomatis saat halaman selesai dimuat
        window.onload = function() {
            startOTPTimer();
        };

        // 3. Submit Form Handle
        document.getElementById('otpForm').addEventListener('submit', async function(event) {
            event.preventDefault(); 
            
            const otpValue = getOTP();
            const emailValue = document.getElementById('emailInput').value;
            const alertBox = document.getElementById('alertMessage');
            const btn = document.getElementById('verifyBtn');

            if (otpValue.length < 6) {
                alertBox.style.display = 'block';
                alertBox.style.backgroundColor = '#f8d7da';
                alertBox.style.color = '#721c24';
                alertBox.innerText = 'OTP belum lengkap.';
                return;
            }

            btn.innerHTML = "Memverifikasi...";
            btn.disabled = true;
            alertBox.style.display = 'none';

            try {
                const response = await fetch('{{ url_for("orangtua.verify_reset_otp") }}', { 
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: emailValue, otp: otpValue })
                });

                const data = await response.json();
                alertBox.style.display = 'block';
                
                if (response.ok) {
                    alertBox.style.backgroundColor = '#d4edda';
                    alertBox.style.color = '#155724';
                    alertBox.innerText = data.message;
                    
                    // Hapus data timer dari browser karena verifikasi telah sukses dilakukan
                    clearInterval(otpInterval);
                    sessionStorage.removeItem("lupa_password_otp_timeout");

                    setTimeout(() => { window.location.href = data.redirect; }, 1000);
                } else {
                    alertBox.style.backgroundColor = '#f8d7da';
                    alertBox.style.color = '#721c24';
                    alertBox.innerText = data.message;
                    btn.innerHTML = "Verifikasi Kode";
                    btn.disabled = false;
                    
                    clearOTPInputs();
                }
            } catch (error) {
                alertBox.style.display = 'block';
                alertBox.style.backgroundColor = '#f8d7da';
                alertBox.style.color = '#721c24';
                alertBox.innerText = "Terjadi kesalahan pada server.";
                btn.innerHTML = "Verifikasi Kode";
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
