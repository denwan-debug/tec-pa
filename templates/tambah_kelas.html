<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TEC Admin - Buat Kelas Baru</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-main: #FFF5F5;
            --maroon-primary: #A22754;
            --maroon-text: #8E1F47;
        }
    </style>
</head>
<body class="bg-[#FFF5F5] font-sans antialiased flex h-screen overflow-hidden">

    <!-- SIDEBAR -->
    <aside class="w-64 bg-white border-r border-rose-100 flex flex-col justify-between p-6 shrink-0">
        <div>
            <!-- Logo Section -->
            <div class="flex items-center gap-3 mb-10">
                <div class="w-10 h-10 bg-[#A22754] rounded-xl flex items-center justify-center text-white">
                    <i class="fa-solid fa-graduation-cap text-xl"></i>
                </div>
                <div>
                    <h1 class="text-[#A22754] font-bold text-lg leading-tight">TEC Admin</h1>
                    <p class="text-xs text-gray-400 font-medium">Management Portal</p>
                </div>
            </div>

            <!-- Navigation Links -->
            <nav class="space-y-2">
                <a href="#" class="flex items-center gap-3 px-4 py-3 text-gray-500 hover:bg-rose-50 rounded-xl transition font-medium text-sm">
                    <i class="fa-solid fa-border-all w-5"></i> Beranda
                </a>
                <a href="#" class="flex items-center gap-3 px-4 py-3 bg-[#DCEEFF] text-slate-700 rounded-xl font-semibold text-sm">
                    <i class="fa-solid fa-graduation-cap w-5 text-slate-600"></i> Manajemen Kelas
                </a>
                <a href="#" class="flex items-center gap-3 px-4 py-3 text-gray-500 hover:bg-rose-50 rounded-xl transition font-medium text-sm">
                    <i class="fa-solid fa-users w-5"></i> Orang tua & Siswa
                </a>
                <a href="#" class="flex items-center gap-3 px-4 py-3 text-gray-500 hover:bg-rose-50 rounded-xl transition font-medium text-sm">
                    <i class="fa-solid fa-user-tie w-5"></i> Manajemen Pengajar
                </a>
                <a href="#" class="flex items-center gap-3 px-4 py-3 text-gray-500 hover:bg-rose-50 rounded-xl transition font-medium text-sm">
                    <i class="fa-solid fa-wallet w-5"></i> Validasi Pembayaran
                </a>
            </nav>
        </div>

        <div>
            <hr class="border-rose-100 mb-4">
            <a href="#" class="flex items-center gap-3 px-4 py-2 text-gray-500 hover:text-red-600 font-semibold text-sm transition">
                <i class="fa-solid fa-arrow-right-from-bracket rotate-180"></i> KELUAR
            </a>
        </div>
    </aside>

    <!-- MAIN CONTENT AREA -->
    <main class="flex-1 flex flex-col overflow-hidden relative">
        
        <!-- TOPBAR -->
        <header class="bg-white h-16 border-b border-rose-100 px-8 flex items-center justify-between shrink-0">
            <div class="text-sm font-medium text-gray-700">Buat Kelas Baru</div> 
            <div class="flex items-center gap-3">
                <img src="https://images.unsplash.com/photo-1472099645785-5658abf4ff4e?auto=format&fit=crop&w=100&q=80" alt="Admin Avatar" class="w-8 h-8 rounded-full object-cover border border-gray-200">
            </div>
        </header>

        <!-- FORM CONTENT CONTAINER (SCROLLABLE) -->
        <section class="flex-1 p-8 overflow-y-auto pb-36">
            <div class="max-w-5xl mx-auto space-y-6">
                
                <!-- CARD 1: INFORMASI DASAR -->
                <div class="bg-white rounded-2xl border border-rose-100 p-6 shadow-xs">
                    <div class="flex items-center gap-2 text-[#8E1F47] font-semibold border-b border-gray-100 pb-4 mb-6">
                        <i class="fa-regular fa-circle-info text-lg"></i>
                        <span>Informasi Dasar</span>
                    </div>

                    <div class="grid grid-cols-3 gap-6">
                        <div class="col-span-2 space-y-2">
                            <label class="text-sm font-medium text-gray-600">Nama Kelas</label>
                            <input type="text" placeholder="contoh : Kelas School Curriculum Support (SMA)" class="w-full bg-white border border-gray-300 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:border-rose-400 text-gray-700 transition">
                        </div>
                        
                        <div class="space-y-2">
                            <label class="text-sm font-medium text-gray-600">Tingkat</label>
                            <div class="relative">
                                <select class="w-full bg-white border border-gray-300 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:border-rose-400 text-gray-700 appearance-none transition">
                                    <option>SMA</option>
                                    <option>SMP</option>
                                    <option>SD</option>
                                </select>
                                <i class="fa-solid fa-chevron-down absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 text-xs pointer-events-none"></i>
                            </div>
                        </div>

                        <div class="col-span-2 space-y-2">
                            <label class="text-sm font-medium text-gray-600">Mata Pelajaran</label>
                            <div class="relative">
                                <select class="w-full bg-white border border-gray-300 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:border-rose-400 text-gray-700 appearance-none transition">
                                    <option>School Curriculum Support</option>
                                    <option>Writing</option>
                                    <option>Speaking</option>
                                </select>
                                <i class="fa-solid fa-chevron-down absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 text-xs pointer-events-none"></i>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- CARD 2: DESKRIPSI KELAS -->
                <div class="bg-white rounded-2xl border border-rose-100 p-6 shadow-xs">
                    <div class="flex items-center gap-2 text-[#8E1F47] font-semibold border-b border-gray-100 pb-4 mb-4">
                        <i class="fa-regular fa-file-lines text-lg"></i>
                        <span>Deskripsi Kelas</span>
                    </div>
                    <div class="space-y-2">
                        <textarea rows="3" placeholder="Masukkan deskripsi kelas di sini..." class="w-full bg-white border border-gray-300 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-rose-400 text-gray-700 placeholder-gray-400 transition resize-none"></textarea>
                    </div>
                </div>

                <!-- CARD 3: PILIH PENGAJAR (TUTOR) - Berdasarkan Screenshot 2026-06-24 223011.png -->
                <div class="bg-white rounded-2xl border border-rose-100 p-6 shadow-xs">
                    <div class="flex items-center gap-2 text-[#8E1F47] font-semibold border-b border-gray-100 pb-4 mb-6">
                        <i class="fa-regular fa-user text-lg"></i>
                        <span>Pilih Pengajar (Tutor)</span>
                    </div>

                    <div class="flex items-end gap-6">
                        <!-- Input Cari Pengajar -->
                        <div class="flex-1 space-y-2">
                            <label class="text-sm font-medium text-gray-600">Pilih Tutor</label>
                            <div class="relative">
                                <i class="fa-solid fa-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-gray-600"></i>
                                <input type="text" placeholder="Cari Pengajar" class="w-full bg-white border border-gray-500 rounded-xs pl-11 pr-4 py-2.5 text-sm focus:outline-none focus:border-rose-400 text-gray-700 transition">
                            </div>
                        </div>

                        <!-- Tutor Selected Badge Card -->
                        <div class="bg-[#F0F7FF] border border-[#CCE3FF] rounded-2xl p-3 flex items-center gap-4 min-w-[300px]">
                            <img src="https://images.unsplash.com/photo-1560250097-0b93528c311a?auto=format&fit=crop&w=100&q=80" alt="Dr. Marcus Chen" class="w-12 h-12 rounded-full object-cover">
                            <div>
                                <h5 class="text-sm font-bold text-gray-900 leading-tight">Dr. Marcus Chen</h5>
                                <p class="text-xs text-gray-500 font-medium mt-0.5">Speaking Specialist</p>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- CARD 4: JADWAL & TIMELINE - Berdasarkan Screenshot 2026-06-24 222808.png -->
                <div class="bg-white rounded-2xl border border-rose-100 p-6 shadow-xs">
                    <div class="flex items-center gap-2 text-[#8E1F47] font-semibold border-b border-gray-100 pb-4 mb-6">
                        <i class="fa-regular fa-calendar text-lg"></i>
                        <span>Jadwal & Timeline</span>
                    </div>

                    <div class="space-y-6">
                        <!-- Row 1: Dates -->
                        <div class="grid grid-cols-2 gap-6">
                            <div class="space-y-2">
                                <label class="text-sm font-medium text-gray-600">Mulai Tanggal</label>
                                <input type="text" placeholder="mm/dd/yyyy" class="w-full bg-white border border-gray-500 rounded-xs px-4 py-2.5 text-sm focus:outline-none focus:border-rose-400 text-gray-700 transition">
                            </div>
                            <div class="space-y-2">
                                <label class="text-sm font-medium text-gray-600">Tanggal Berakhir</label>
                                <input type="text" placeholder="mm/dd/yyyy" class="w-full bg-white border border-gray-500 rounded-xs px-4 py-2.5 text-sm focus:outline-none focus:border-rose-400 text-gray-700 transition">
                            </div>
                        </div>

                        <!-- Row 2: Weekly Schedule Pills -->
                        <div class="space-y-2">
                            <label class="text-sm font-medium text-gray-600">Jadwal Mingguan</label>
                            <div class="flex flex-wrap gap-2.5">
                                <button type="button" class="px-5 py-2 border border-rose-200 text-gray-700 text-sm font-medium rounded-xl hover:bg-rose-50/50 transition">Mon</button>
                                <button type="button" class="px-5 py-2 bg-[#A22754] text-white text-sm font-semibold rounded-xl shadow-xs">Tue</button>
                                <button type="button" class="px-5 py-2 border border-rose-200 text-gray-700 text-sm font-medium rounded-xl hover:bg-rose-50/50 transition">Wed</button>
                                <button type="button" class="px-5 py-2 bg-[#A22754] text-white text-sm font-semibold rounded-xl shadow-xs">Thu</button>
                                <button type="button" class="px-5 py-2 border border-rose-200 text-gray-700 text-sm font-medium rounded-xl hover:bg-rose-50/50 transition">Fri</button>
                                <button type="button" class="px-5 py-2 border border-rose-200 text-gray-700 text-sm font-medium rounded-xl hover:bg-rose-50/50 transition">Sat</button>
                                <button type="button" class="px-5 py-2 border border-rose-200 text-gray-700 text-sm font-medium rounded-xl hover:bg-rose-50/50 transition">Sun</button>
                            </div>
                        </div>

                        <!-- Row 3: Times -->
                        <div class="grid grid-cols-2 gap-6">
                            <div class="space-y-2">
                                <label class="text-sm font-medium text-gray-600">Jam Mulai (Start)</label>
                                <input type="text" placeholder="14 : 00" class="w-full bg-white border border-gray-500 rounded-xs px-4 py-2.5 text-sm focus:outline-none focus:border-rose-400 text-gray-700 transition">
                            </div>
                            <div class="space-y-2">
                                <label class="text-sm font-medium text-gray-600">Jam Beakhir (End)</label>
                                <input type="text" placeholder="16 : 00" class="w-full bg-white border border-gray-500 rounded-xs px-4 py-2.5 text-sm focus:outline-none focus:border-rose-400 text-gray-700 transition">
                            </div>
                        </div>
                    </div>
                </div>

                <!-- CARD 5: KAPASITAS & HARGA - Berdasarkan Screenshot 2026-06-24 222938.png -->
                <div class="bg-white rounded-2xl border border-rose-100 p-6 shadow-xs">
                    <div class="flex items-center gap-2 text-[#8E1F47] font-semibold border-b border-gray-100 pb-4 mb-6">
                        <i class="fa-regular fa-money-bill-1 text-lg"></i>
                        <span>Kapasitas & Harga</span>
                    </div>

                    <!-- Grid matching the right shifted inputs from screenshot -->
                    <div class="grid grid-cols-3 gap-6">
                        <!-- Left space is intentionally left empty to match design alignment -->
                        <div></div>
                        
                        <!-- Price Input -->
                        <div class="space-y-2">
                            <label class="text-sm font-medium text-gray-600">Price per Term ($)</label>
                            <input type="text" placeholder="$ 450.00" class="w-full bg-white border border-gray-500 rounded-xs px-4 py-2.5 text-sm focus:outline-none focus:border-rose-400 text-gray-700 font-medium transition">
                        </div>

                        <!-- Discount Input -->
                        <div class="space-y-2">
                            <label class="text-sm font-medium text-gray-600">Early Bird Discount (%)</label>
                            <input type="text" placeholder="10" class="w-full bg-white border border-gray-500 rounded-xs px-4 py-2.5 text-sm focus:outline-none focus:border-rose-400 text-gray-700 transition">
                        </div>
                    </div>
                </div>

            </div>
        </section>

        <!-- FLOATING BOTTOM BAR -->
        <footer class="absolute bottom-0 left-0 right-0 bg-white border-t border-rose-100 px-8 py-4 flex items-center justify-between shadow-md z-10">
            <div class="flex items-center gap-2 text-xs text-gray-500 font-medium">
                <i class="fa-regular fa-clock text-gray-400"></i>
                <span>Draft last saved at 14:32</span>
            </div>

            <div class="flex items-center gap-4">
                <button class="px-6 py-2 border border-gray-300 hover:bg-gray-50 text-gray-700 font-semibold text-sm rounded-xl transition">
                    Cancel
                </button>
                <button class="px-6 py-2 bg-[#A22754] hover:bg-[#851E43] text-white font-semibold text-sm rounded-xl shadow-xs transition">
                    Save Class
                </button>
            </div>
        </footer>

    </main>

</body>
</html>
