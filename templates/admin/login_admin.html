<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login Administrator - TEC Portal</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
* { margin:0; padding:0; box-sizing:border-box; font-family:'Poppins', sans-serif; }
body { min-height:100vh; display:flex; background:#f8f9fa; overflow: hidden; }

:root {
    --primary-color: #f05b87;
    --primary-hover: #d94973;
    --text-dark: #2d3748;
    --text-gray: #273c5d;
    --border-color: #e2e8f0;
}

/* ===== LEFT SIDE ===== */
.left-panel { 
    width: 60%; 
    background: #f3f2f6; 
    display: flex; 
    justify-content: flex-end; /* Mendorong seluruh isi ke ujung kanan */
    align-items: center; 
    overflow: hidden;
    padding: 0; /* Menghilangkan padding agar tidak ada tembok pemisah sama sekali */
}

.left-panel img { 
    width: 100%; 
    max-width: 100%; /* Membiarkan gambar memakan 100% dari sisa ruang di kiri */
    max-height: 95vh; 
    object-fit: contain; 
    object-position: right center; /* KUNCI UTAMA: Memaksa gambar rapat ke sisi kanan kotak, bukan di tengah */
}

/* ===== RIGHT SIDE ===== */
/* ===== RIGHT SIDE & KOTAK LOGIN ===== */
.right-panel { width:40%; display:flex; justify-content:center; align-items:center; padding:20px; } /* Padding luar dikurangi */
.login-card { width:100%; max-width:500px; background:#fff; border-radius:16px; padding:35px 45px; box-shadow:0 10px 30px rgba(0,0,0,.04); } /* Padding dalam dikurangi */

.logo-box { width:60px; height:60px; background:var(--primary-color); border-radius:50%; margin:auto; display:flex; justify-content:center; align-items:center; color:white; font-size:24px; } /* Ukuran logo dikecilkan sedikit */

.title { text-align:center; margin-top:12px; font-size:24px; font-weight:600; color:var(--text-dark); } /* Jarak atas dikurangi */
.subtitle { text-align:center; margin-top:5px; color:var(--text-gray); font-size:13px; line-height:1.5; margin-bottom: 20px;} /* Jarak bawah dikurangi */

.form-group { margin-top:18px; } /* Jarak antar form dikurangi */
.form-group label { display:block; margin-bottom:6px; font-size:13px; color:var(--text-dark); font-weight:600; }

.input-box { position:relative; }
/* Tinggi kotak input diubah dari 55px menjadi 48px */
.input-box input { width:100%; height:48px; border:1px solid var(--border-color); border-radius:12px; padding:0 45px 0 15px; font-size:14px; outline:none; background:#fff; color:var(--text-gray); transition: 0.3s;}
.input-box input::placeholder { color: #a0aec0; }
.input-box input:focus { border-color: var(--primary-color); box-shadow: 0 0 0 3px rgba(240, 91, 135, 0.1); }
.input-box i { position:absolute; right:15px; top:50%; transform:translateY(-50%); color:#a0aec0; font-size:18px; cursor: pointer;}

.password-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:6px; }
.password-header label { margin-bottom:0; }
.password-header a { text-decoration:none; color:var(--primary-color); font-weight:600; font-size:12px; }
.password-header a:hover { text-decoration: underline; }

/* Tinggi tombol dikurangi dari 55px menjadi 48px & Jarak atasnya dikurangi */
.btn-login { width:100%; height:48px; margin-top:25px; border:none; border-radius:12px; background:var(--primary-color); color:white; font-size:15px; font-weight:600; cursor:pointer; transition:.3s; display:flex; justify-content:center; align-items:center; gap: 10px; }
.btn-login:hover { background:var(--primary-hover); }

/* === Flash Message / Toast Notification === */
.toast-container {
    position: fixed;
    top: 24px;
    right: 24px;
    z-index: 10000;
    display: flex;
    flex-direction: column;
    gap: 12px;
    pointer-events: none;
}

.toast {
    display: flex;
    align-items: center;
    gap: 12px;
    background-color: white;
    border-radius: 12px;
    padding: 16px 20px;
    min-width: 300px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.12);
    border-left: 4px solid #22c55e;
    transform: translateX(120%);
    opacity: 0;
    transition: transform 0.35s ease, opacity 0.35s ease;
    pointer-events: auto;
}

.toast.show {
    transform: translateX(0);
    opacity: 1;
}

.toast.error {
    border-left-color: #ef4444;
}

.toast-icon {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 15px;
    flex-shrink: 0;
    background-color: #dcfce7;
    color: #16a34a;
}

.toast.error .toast-icon {
    background-color: #fee2e2;
    color: #dc2626;
}

.toast-message {
    font-size: 14px;
    font-weight: 600;
    color: #202020;
}

.toast-close {
    margin-left: auto;
    background: none;
    border: none;
    color: #a0a0a0;
    cursor: pointer;
    font-size: 14px;
    padding: 4px;
}

@media (max-width: 480px) {
    .toast-container { top: 12px; right: 12px; left: 12px; }
    .toast { min-width: 0; }
}

@media(max-width:1200px){ .left-panel{ display:none; } .right-panel{ width:100%; } .login-card { padding: 40px; } }
</style>
</head>
<body>

<div class="toast-container" id="toastContainer"></div>

<div class="left-panel">
    <img src="{{ url_for('static', filename='images/LOGO_TEC_NOBG.png') }}" alt="Dashboard Admin" style="max-width: 320px; width: 100%; height: auto; display: block; margin: 0 auto;" alt="Logo TEC"> 
</div>

<div class="right-panel">
    <div class="login-card">

        <div class="logo-box">
            <i class="fa-solid fa-user-shield"></i>
        </div>

        <h1 class="title">Administrator</h1>

        <p class="subtitle">
            Masuk untuk mengelola kelas, tutor, siswa, dan<br>pembayaran.
        </p>

        <form id="loginForm">
            <div class="form-group">
                <label>Alamat Email</label>
                <div class="input-box">
                    <input type="email" id="email" placeholder="admin@tenglishclub.com" required>
                    <i class="fa-regular fa-envelope"></i>
                </div>
            </div>

            <div class="form-group">
                <div class="password-header">
                    <label>Kata Sandi</label>
                </div>
                <div class="input-box">
                    <input type="password" id="password" placeholder="••••••••" required>
                    <i class="fa-regular fa-eye" id="togglePassword" onclick="togglePasswordVisibility()"></i>
                </div>
            </div>

            <button type="submit" class="btn-login" id="loginBtn">
                Masuk <i class="fa-solid fa-arrow-right-to-bracket"></i>
            </button>
        </form>

    </div>
</div>

<script>
    // 1. Fitur Menampilkan/Menyembunyikan Password
    function togglePasswordVisibility() {
        const passwordInput = document.getElementById('password');
        const toggleIcon = document.getElementById('togglePassword');
        
        if (passwordInput.type === 'password') {
            passwordInput.type = 'text';
            toggleIcon.classList.remove('fa-eye');
            toggleIcon.classList.add('fa-eye-slash');
        } else {
            passwordInput.type = 'password';
            toggleIcon.classList.remove('fa-eye-slash');
            toggleIcon.classList.add('fa-eye');
        }
    }

    // 2. Toast Notification (gaya sama seperti login.html)
    function showToast(message, type = 'success') {
        const container = document.getElementById('toastContainer');

        const toast = document.createElement('div');
        toast.className = `toast ${type === 'error' ? 'error' : ''}`;

        const iconClass = type === 'error' ? 'fa-circle-xmark' : 'fa-circle-check';

        toast.innerHTML = `
            <div class="toast-icon">
                <i class="fa-solid ${iconClass}"></i>
            </div>
            <span class="toast-message">${message}</span>
            <button type="button" class="toast-close">
                <i class="fa-solid fa-xmark"></i>
            </button>
        `;

        toast.querySelector('.toast-close').addEventListener('click', function() {
            this.parentElement.remove();
        });

        container.appendChild(toast);

        setTimeout(() => {
            toast.classList.add('show');
        }, 10);

        setTimeout(() => {
            toast.classList.remove('show');
            setTimeout(() => {
                toast.remove();
            }, 350);
        }, 4000);
    }

    // 3. Logika Pengiriman Form ke Backend Flask
    document.getElementById('loginForm').addEventListener('submit', async function(e) {
        e.preventDefault(); 
        
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const btnLogin = document.getElementById('loginBtn');
        
        btnLogin.disabled = true;
        btnLogin.innerHTML = 'Memproses... <i class="fa-solid fa-spinner fa-spin"></i>';

        try {
            // Sesuaikan endpoint '/login_admin_action' ini jika ini menjadi login admin
            const response = await fetch('/login_admin_action', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: email, password: password })
            });

            const data = await response.json();

            if (response.ok) {
                showToast(data.message || 'Login berhasil! Mengalihkan...', 'success');
                
                setTimeout(() => {
                    window.location.href = data.redirect || '/dashboard_admin';
                }, 1000);
            } else {
                showToast(data.message || 'Email atau kata sandi salah.', 'error');
                
                btnLogin.disabled = false;
                btnLogin.innerHTML = 'Masuk <i class="fa-solid fa-arrow-right-to-bracket"></i>';
            }
        } catch (error) {
            showToast('Gagal terhubung ke server.', 'error');
            
            btnLogin.disabled = false;
            btnLogin.innerHTML = 'Masuk <i class="fa-solid fa-arrow-right-to-bracket"></i>';
        }
    });
</script>

</body>
</html>
