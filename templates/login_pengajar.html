<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login Pembimbing - TEC</title>

<!-- Google Fonts: Poppins -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<!-- FontAwesome Icons -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
* { margin:0; padding:0; box-sizing:border-box; font-family:'Poppins', sans-serif; }

body { 
    height: 100vh; 
    display: flex; 
    background: #fdfbfb; /* Warna latar sangat terang (off-white) */
    overflow: hidden; 
}

/* ===== LEFT SIDE ===== */
.left-panel { 
    width: 55%; 
    background: #f4f6f8; /* Latar belakang abu-abu terang kebiruan seperti di gambar */
    display: flex; 
    justify-content: center; 
    align-items: center; 
    overflow: hidden;
    padding: 20px;
}

.left-panel img { 
    width: 100%; 
    max-width: 900px; 
    max-height: 90vh; 
    object-fit: contain; 
}

/* ===== RIGHT SIDE ===== */
.right-panel { 
    width: 45%; 
    display: flex; 
    justify-content: center; 
    align-items: center; 
    padding: 40px; 
}

.login-card { 
    width: 100%; 
    max-width: 480px; 
    background: #ffffff; 
    border-radius: 20px; /* Sudut lebih membulat */
    padding: 45px 50px; 
    box-shadow: 0 10px 40px rgba(0, 0, 0, 0.04); /* Bayangan sangat halus */
}

/* Typography */
.title { 
    font-size: 26px; 
    font-weight: 700; 
    color: #212121; 
    margin-bottom: 8px;
    letter-spacing: 0.5px;
}

.subtitle { 
    color: #757575; 
    font-size: 14px; 
    line-height: 1.6; 
    margin-bottom: 35px;
}

/* Forms */
.form-group { 
    margin-bottom: 20px; 
}

.form-group label { 
    display: block; 
    margin-bottom: 8px; 
    font-size: 12px; 
    color: #424242; 
    font-weight: 500; 
}

/* Input Fields Style seperti di gambar */
.input-wrapper { 
    position: relative; 
}

.input-wrapper input { 
    width: 100%; 
    height: 52px; 
    background: #fcf4f6; /* Warna pink sangat pudar di dalam input */
    border: 1px solid #f4d9df; /* Garis tepi pink pudar */
    border-radius: 12px; 
    padding: 0 20px; 
    font-size: 14px; 
    color: #424242; 
    outline: none; 
    transition: 0.3s;
}

.input-wrapper input::placeholder { 
    color: #b0a5a8; 
}

.input-wrapper input:focus { 
    border-color: #ed5a8b; 
    background: #ffffff;
}

/* Icon Eye di dalam password */
.input-wrapper .fa-eye, 
.input-wrapper .fa-eye-slash { 
    position: absolute; 
    right: 18px; 
    top: 50%; 
    transform: translateY(-50%); 
    color: #424242; 
    font-size: 16px; 
    cursor: pointer;
}

/* Header untuk Kata Sandi (Label & Lupa Sandi) */
.password-header { 
    display: flex; 
    justify-content: space-between; 
    align-items: center; 
    margin-bottom: 8px; 
}

.password-header label { 
    margin-bottom: 0; 
}

.password-header a { 
    text-decoration: none; 
    color: #ed5a8b; /* Warna pink khas */
    font-size: 12px; 
    font-weight: 500; 
}

.password-header a:hover { 
    text-decoration: underline; 
}

/* Button */
.btn-login { 
    width: 100%; 
    height: 52px; 
    margin-top: 15px; 
    border: none; 
    border-radius: 12px; 
    background: #ed5a8b; /* Warna pink utama */
    color: white; 
    font-size: 15px; 
    font-weight: 600; 
    cursor: pointer; 
    transition: 0.3s; 
    display: flex; 
    justify-content: center; 
    align-items: center; 
    gap: 8px; 
}

.btn-login:hover { 
    background: #d44876; 
}

/* Alert Box */
.alert { display: none; padding: 12px; margin-top: 20px; border-radius: 10px; font-size: 13px; text-align: center; font-weight: 500; }
.alert-error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
.alert-success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }

/* Responsiveness */
@media(max-width:1100px){ 
    .left-panel { display: none; } 
    .right-panel { width: 100%; background: #f4f6f8; } 
}
</style>
</head>
<body>

<div class="left-panel">
    <!-- Ganti dengan nama file gambar ilustrasi Anda -->
    <img src="{{ url_for('static', filename='images/ilustrasi-pembimbing.png') }}" alt="Ilustrasi Kelas">
</div>
  
<div class="right-panel">
    <div class="login-card">

        <h1 class="title">PEMBIMBING</h1>

        <p class="subtitle">
            Masuk untuk mengelola kelas, absensi, materi, dan rapor siswa.
        </p>

        <div id="alertBox" class="alert"></div>

        <form id="loginForm">
            
            <div class="form-group">
                <label>Alamat Email</label>
                <div class="input-wrapper">
                    <input type="email" id="email" placeholder="nama@email.com" required>
                </div>
            </div>

            <div class="form-group">
                <div class="password-header">
                    <label>Kata Sandi</label>
                    <a href="#">Lupa Kata Sandi?</a>
                </div>
                <div class="input-wrapper">
                    <input type="password" id="password" placeholder="••••••••" required>
                    <i class="fa-regular fa-eye" id="togglePassword" onclick="togglePasswordVisibility()"></i>
                </div>
            </div>

            <button type="submit" class="btn-login" id="loginBtn">
                Masuk <i class="fa-solid fa-arrow-right-to-bracket"></i>
            </button>

        </form>
    </div>
</div>

<script>
    // 1. Fitur Toggle Mata Password
    function togglePasswordVisibility() {
        const passwordInput = document.getElementById('password');
        const toggleIcon = document.getElementById('togglePassword');
        
        if (passwordInput.type === 'password') {
            passwordInput.type = 'text';
            toggleIcon.classList.remove('fa-eye');
            toggleIcon.classList.add('fa-eye-slash');
        } else {
            passwordInput.type = 'password';
            toggleIcon.classList.remove('fa-eye-slash');
            toggleIcon.classList.add('fa-eye');
        }
    }

    // 2. Logika Pengiriman Form (Sama seperti sebelumnya, siap dihubungkan ke backend)
    document.getElementById('loginForm').addEventListener('submit', async function(e) {
        e.preventDefault(); 
        
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const btnLogin = document.getElementById('loginBtn');
        const alertBox = document.getElementById('alertBox');
        
        btnLogin.disabled = true;
        btnLogin.innerHTML = 'Memproses... <i class="fa-solid fa-spinner fa-spin"></i>';
        alertBox.style.display = 'none';
        alertBox.className = 'alert';

        try {
            // Endpoint untuk pengajar
            const response = await fetch('/login_pengajar_action', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: email, password: password })
            });

            const data = await response.json();

            if (response.ok) {
                alertBox.classList.add('alert-success');
                alertBox.innerText = 'Login berhasil! Mengalihkan...';
                alertBox.style.display = 'block';
                
                setTimeout(() => {
                    window.location.href = data.redirect || '/dashboard_pengajar';
                }, 1000);
            } else {
                alertBox.classList.add('alert-error');
                alertBox.innerText = data.message || 'Email atau kata sandi salah.';
                alertBox.style.display = 'block';
                
                btnLogin.disabled = false;
                btnLogin.innerHTML = 'Masuk <i class="fa-solid fa-arrow-right-to-bracket"></i>';
            }
        } catch (error) {
            alertBox.classList.add('alert-error');
            alertBox.innerText = 'Gagal terhubung ke server.';
            alertBox.style.display = 'block';
            
            btnLogin.disabled = false;
            btnLogin.innerHTML = 'Masuk <i class="fa-solid fa-arrow-right-to-bracket"></i>';
        }
    });
</script>

</body>
</html>
